  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Reset background blob — we're inside a canvas, not a page */
    body::before { display: none; }
    /* Topbar inside an artboard should not be sticky/global */
    .static-shell .topbar { position: relative; }
    /* Each static-shell inherits paper bg; force size to fill artboard */
    .static-shell { display: grid; grid-template-rows: auto 1fr auto; }
    .static-shell .page { padding: 24px 28px 60px; }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

        <rect x="60" width="50" height="50" rx="10" fill="#6BB6FF"/>
        <rect y="60" width="50" height="50" rx="10" fill="#B095F0"/>
        <rect x="60" y="60" width="50" height="50" rx="10" fill="#FFC85C"/>
